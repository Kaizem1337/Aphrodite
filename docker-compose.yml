services:
  aphrodite:
    image: ghcr.io/kaizem1337/aphrodite:latest
    pull_policy: always
    container_name: aphrodite
    restart: unless-stopped
    ports:
      - "3417:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
